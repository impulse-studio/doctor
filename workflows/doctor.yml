name: Doctor

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-updates:
    name: Check Doctor Updates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for doctor updates
        run: curl -fsSL https://raw.githubusercontent.com/impulse-studio/doctor/main/check-updates.sh | bash
        continue-on-error: true

  react:
    name: React Best Practices
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run Doctor checks
        run: bash .doctor/run.sh --ci
